                            <div className="bg-white/90 rounded-xl flex items-center px-4 py-3 shadow-sm focus-within:ring-2 focus-within:ring-yellow-300 transition-all focus-within:scale-105">
                                <Lock size={20} className="text-pink-600 mr-3"/>
                                <input 
                                    type="password" 
                                    placeholder={t('पिन', '4-Digit PIN')}
                                    className="bg-transparent w-full outline-none text-gray-800 font-medium placeholder:text-gray-400"
                                    value={loginForm.pin}
                                    onChange={e => setLoginForm({...loginForm, pin: e.target.value})}
                                    maxLength={4}
                                />
                            </div>
                            <button 
                                onClick={handleLogin}
                                className="w-full bg-yellow-400 hover:bg-yellow-300 text-pink-900 font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 mt-4 hover:shadow-xl"
                            >
                                {t('लॉगिन करें', 'Login')} <ArrowRight size={20}/>
                            </button>
                        </div>

                        <div className="text-center mt-8">
                            <p className="text-white/70 text-sm mb-2">{t('नया खाता है?', 'New here?')}</p>
                            <button 
                                onClick={() => { setScreen('signup'); setOtpSent(false); setSignupForm({ name: '', phone: '', ashaId: '', pin: '', confirmPin: '', otp: '' }); }}
                                className="text-white font-bold text-sm border-b-2 border-white/30 hover:border-white pb-0.5 hover:scale-105 transition-transform"
                            >
                                {t('रजिस्टर करें', 'Register New ASHA')}
                            </button>
                        </div>
                    </div>
                    <div className="mt-8">
                        <GovFooter />
                    </div>
                </div>
            );

            const renderSignup = () => (
                <div key="signup" className="min-h-screen bg-gray-50 flex flex-col animate-in slide-in-from-right-full duration-500">
                    <div className="bg-gradient-to-r from-pink-600 to-purple-600 p-6 rounded-b-3xl shadow-lg pt-12">
                        <button onClick={() => { if(otpSent) setOtpSent(false); else setScreen('login'); }} className="text-white/80 mb-4 flex items-center gap-2 font-medium hover:text-white transition-colors">
                            <ArrowLeft size={18}/> {t('वापस', 'Back')}
                        </button>
                        <h1 className="text-2xl font-bold text-white">{otpSent ? t('OTP सत्यापन', 'Verify OTP') : t('नया पंजीकरण', 'Register Account')}</h1>
                        <p className="text-pink-100 text-sm mt-1 opacity-80">{otpSent ? t('आपके मोबाइल पर OTP भेजा गया है', 'Enter OTP sent to your mobile') : t('अपना आशा विवरण भरें', 'Enter your ASHA details')}</p>
                    </div>

                    <div className="p-6 space-y-5 -mt-4">
                        {!otpSent ? (
                            <>
                            <div className="bg-white p-6 rounded-2xl shadow-md border border-gray-100 space-y-4 animate-in slide-in-from-bottom-8 duration-500">
                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">{t('पूरा नाम', 'Full Name')}</label>
                                    <div className="bg-gray-50 rounded-xl flex items-center px-4 py-3 border border-gray-200 focus-within:border-pink-500 focus-within:ring-1 focus-within:ring-pink-200 transition-all">
                                        <UserCircle size={20} className="text-gray-400 mr-3"/>
                                        <input 
                                            type="text" 
                                            placeholder="Rekha Singh"
                                            className="bg-transparent w-full outline-none text-gray-800 font-medium"
                                            value={signupForm.name}
                                            onChange={e => setSignupForm({...signupForm, name: e.target.value})}
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">{t('आशा आईडी', 'ASHA ID')}</label>
                                    <div className="bg-gray-50 rounded-xl flex items-center px-4 py-3 border border-gray-200 focus-within:border-pink-500 focus-within:ring-1 focus-within:ring-pink-200 transition-all">
                                        <ShieldCheck size={20} className="text-gray-400 mr-3"/>
                                        <input 
                                            type="text" 
                                            placeholder="ASH-NAND-001"
                                            className="bg-transparent w-full outline-none text-gray-800 font-medium"
                                            value={signupForm.ashaId}
                                            onChange={e => setSignupForm({...signupForm, ashaId: e.target.value})}
                                        />
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">{t('मोबाइल नंबर', 'Mobile Number')}</label>
                                    <div className="bg-gray-50 rounded-xl flex items-center px-4 py-3 border border-gray-200 focus-within:border-pink-500 focus-within:ring-1 focus-within:ring-pink-200 transition-all">
                                        <Phone size={20} className="text-gray-400 mr-3"/>
                                        <input 
                                            type="tel" 
                                            placeholder="9876543210"
                                            className="bg-transparent w-full outline-none text-gray-800 font-medium"
                                            value={signupForm.phone}
                                            onChange={e => setSignupForm({...signupForm, phone: e.target.value})}
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">{t('पिन बनाएँ', 'Create PIN')}</label>
                                        <div className="bg-gray-50 rounded-xl flex items-center px-3 py-3 border border-gray-200 focus-within:border-pink-500 transition-all">
                                            <Lock size={16} className="text-gray-400 mr-2"/>
                                            <input 
                                                type="number" 
                                                placeholder="****"
                                                className="bg-transparent w-full outline-none text-gray-800 font-medium"
                                                value={signupForm.pin}
                                                onChange={e => setSignupForm({...signupForm, pin: e.target.value})}
                                                maxLength={4}
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">{t('पुष्टि करें', 'Confirm PIN')}</label>
                                        <div className="bg-gray-50 rounded-xl flex items-center px-3 py-3 border border-gray-200 focus-within:border-pink-500 transition-all">
                                            <KeyRound size={16} className="text-gray-400 mr-2"/>
                                            <input 
                                                type="number" 
                                                placeholder="****"
                                                className="bg-transparent w-full outline-none text-gray-800 font-medium"
                                                value={signupForm.confirmPin}

                            <p className="text-xs text-indigo-100 opacity-90">{t('नए कोर्स और वीडियो उपलब्ध हैं', 'New courses available')}</p>
                        </div>
                        <div className="bg-white/20 p-2 rounded-full"><ChevronRight size={20}/></div>
                    </div>

                    <div className="bg-white p-2 rounded-xl border border-gray-200 shadow-sm flex items-center focus-within:ring-2 focus-within:ring-purple-200 transition-all">
                        <Search className="text-gray-400 ml-2" size={20}/>
                        <input 
                            type="text" 
                            placeholder={t("नाम या गाँव खोजें...", "Search name or village...")}
                            className="w-full p-2 outline-none text-gray-700 font-medium"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                    </div>

                    <div className="bg-gray-100 p-1 rounded-xl flex gap-1">
                        <button 
                            onClick={() => setDashboardTab('all')}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${dashboardTab === 'all' ? 'bg-white text-gray-800 shadow-sm scale-105' : 'text-gray-500 hover:bg-gray-200'}`}
                        >
                            {t('सभी', 'All Women')} ({totalMothers})
                        </button>
                        <button 
                            onClick={() => setDashboardTab('anemic')}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${dashboardTab === 'anemic' ? 'bg-red-600 text-white shadow-sm scale-105' : 'text-gray-500 hover:bg-gray-200'}`}
                        >
                            {t('एनीमिक', 'Anemic')} ({anemicMothers})
                        </button>
                        <button 
                            onClick={() => setDashboardTab('high_risk')}
                            className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${dashboardTab === 'high_risk' ? 'bg-gray-800 text-white shadow-sm scale-105' : 'text-gray-500 hover:bg-gray-200'}`}
                        >
                            {t('हाई रिस्क', 'High Risk')} ({highRiskMothers})
                        </button>
                    </div>

                    <div className="space-y-3 min-h-[200px]">
                        {filteredMothers.length > 0 ? (
                            filteredMothers.map((mom, i) => (
                                <div key={mom.id} onClick={() => { setSelectedMother(mom); setScreen('profile'); }} className="bg-white p-4 rounded-xl flex items-center gap-4 shadow-sm border border-gray-100 hover:shadow-md hover:-translate-y-1 transition-all active:scale-98 animate-in slide-in-from-bottom-4" style={{ animationDelay: `${i * 75}ms` }}>
                                <div className="w-12 h-12 bg-pink-100 rounded-full flex items-center justify-center text-pink-700 font-bold shadow-sm">{mom.image}</div>
                                <div className="flex-1">
                                    <div className="flex justify-between">
                                        <div className="font-bold text-gray-800">{mom.name}</div>
                                        {mom.risk === 'high' && <div className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded font-bold uppercase animate-pulse">High Risk</div>}
                                    </div>
                                    <div className="text-xs text-gray-500 flex items-center gap-2">
                                        <span>{mom.weeks} wks</span> • <span>{mom.village}</span>
                                        {mom.anemia === 'severe' && <span className="w-2 h-2 rounded-full bg-red-500 animate-ping"></span>}
                                    </div>
                                </div>
                                <ChevronRight size={20} className="text-gray-300" />
                                </div>
                            ))
                        ) : (
                            <div className="flex flex-col items-center justify-center py-10 text-gray-400 animate-in fade-in">
                                <Filter size={48} className="mb-2 opacity-20"/>
                                <p className="text-sm">{t("कोई डेटा नहीं मिला", "No records found")}</p>
                            </div>
                        )}
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                        <button onClick={() => setShowScanner(true)} className="bg-purple-500 text-white p-4 rounded-2xl font-bold flex flex-col items-center gap-2 shadow-lg active:scale-95 text-sm hover:shadow-xl hover:-translate-y-1 transition-all"><Scan size={20} /> {t('QR स्कैन करें', 'Scan A-SDT')}</button>
                        <button onClick={() => { setIsEditing(false); setScreen('registration'); }} className="bg-pink-500 text-white p-4 rounded-2xl font-bold flex flex-col items-center gap-2 shadow-lg active:scale-95 text-sm hover:shadow-xl hover:-translate-y-1 transition-all"><Plus size={20} /> {t('नया पंजीकरण', 'New Mother')}</button>
                    </div>
                    <GovFooter />
                    </div>
                );
            };

            const renderTraining = () => (
                <div key="training" className="p-4 space-y-4 pb-24 animate-in slide-in-from-right-full duration-500">
                    <div className="bg-gradient-to-r from-purple-700 to-indigo-700 p-6 rounded-2xl text-white shadow-lg mb-6 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10"></div>
                        <h2 className="text-2xl font-bold flex items-center gap-2 relative z-10"><GraduationCap className="text-yellow-300"/> Academy</h2>
                        <div className="flex items-center gap-2 mt-2 relative z-10">
                            <Star className="text-yellow-400 fill-yellow-400" size={16}/>
                            <span className="font-bold">{earnedStars} Stars Earned</span>
                        </div>
                    </div>

                    <div className="flex bg-gray-100 p-1 rounded-xl gap-1">
                        <button onClick={() => setTrainingTab('academy')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${trainingTab === 'academy' ? 'bg-white text-purple-700 shadow' : 'text-gray-500'}`}>Academy</button>
                        <button onClick={() => setTrainingTab('echo')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${trainingTab === 'echo' ? 'bg-white text-purple-700 shadow' : 'text-gray-500'}`}>ECHO Live</button>
                        <button onClick={() => setTrainingTab('simulation')} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${trainingTab === 'simulation' ? 'bg-white text-purple-700 shadow' : 'text-gray-500'}`}>Sim Lab</button>
                    </div>

                    <div className="min-h-[300px]">
                        {trainingTab === 'academy' && (
                            <div className="space-y-3 animate-in fade-in">
                                {trainingModules.map(module => (
                                    <div key={module.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-3 rounded-full ${module.type === 'audio' ? 'bg-pink-100 text-pink-600' : 'bg-blue-100 text-blue-600'}`}>
                                                {module.type === 'audio' ? <Headphones size={20}/> : <Video size={20}/>}
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-gray-800 text-sm">{module.title}</h4>
                                                <p className="text-xs text-gray-500">{module.duration} • {module.type === 'audio' ? 'Audio' : 'Video'}</p>
                                            </div>
                                        </div>
                                        <button className="text-purple-600 hover:scale-110 transition-transform"><PlayCircle size={28}/></button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {trainingTab === 'echo' && (
                            <div className="space-y-4 animate-in fade-in">
                                {ECHO_SESSIONS.map(session => (
                                    <div key={session.id} className="bg-white p-4 rounded-xl shadow-md border-l-4 border-purple-500">
                                        <div className="flex justify-between items-start mb-2">
                                            <span className="text-[10px] font-bold bg-purple-100 text-purple-700 px-2 py-1 rounded uppercase tracking-wide">{session.status}</span>
                                            <Video size={16} className="text-gray-400"/>
                                        </div>
                                        <h4 className="font-bold text-gray-800 text-lg mb-1">{session.topic}</h4>
                                        <p className="text-sm text-gray-600 mb-3">{session.expert} • {session.time}</p>
                                        <button className="w-full bg-purple-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-purple-700 transition-colors">Join Session</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {trainingTab === 'simulation' && (
                            <div className="bg-white p-6 rounded-2xl shadow-lg border border-purple-100 text-center animate-in zoom-in">
                                <div className="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4 animate-bounce">
                                    <Gamepad2 size={32} className="text-yellow-600"/>
                                </div>
                                <h3 className="font-bold text-xl text-gray-800 mb-2">Daily Challenge</h3>
                                <p className="text-sm text-gray-600 mb-6">"Rani (8 months pregnant) has swelling in feet and BP 150/100. What is your immediate action?"</p>
                                <div className="space-y-3">
                                    <button onClick={()=> alert('Correct! You earned a star!')} className="w-full p-3 rounded-xl border border-gray-200 text-gray-700 font-medium hover:bg-green-50 hover:border-green-300 hover:text-green-700 transition-all text-sm">Advice Rest & Water</button>
                                    <button onClick={()=> { setEarnedStars(s => s+1); setShowConfetti(true); setTimeout(()=>setShowConfetti(false),2000); }} className="w-full p-3 rounded-xl border border-gray-200 text-gray-700 font-medium hover:bg-green-50 hover:border-green-300 hover:text-green-700 transition-all text-sm">Refer to Hospital Immediately</button>
                                    <button onClick={()=> alert('Incorrect. High BP is dangerous.')} className="w-full p-3 rounded-xl border border-gray-200 text-gray-700 font-medium hover:bg-green-50 hover:border-green-300 hover:text-green-700 transition-all text-sm">Wait for 2 days</button>
                                </div>
                            </div>
                        )}
                    </div>
                    {showConfetti && <div className="fixed inset-0 pointer-events-none flex items-center justify-center z-50"><div className="animate-ping text-6xl">🌟</div></div>}
                    <GovFooter />
                    <button onClick={() => setScreen('home')} className="fixed top-4 right-4 bg-gray-800 text-white p-2 rounded-full shadow-lg z-50 hover:bg-gray-700 hover:rotate-90 transition-all">
                        <X size={20} />
                    </button>
                </div>
            );

            const renderResult = () => {
                const cfg = { GREEN: { c: 'bg-green-500', t: 'NORMAL', i: <Check size={48}/>, a: 'Routine Care' }, YELLOW: { c: 'bg-yellow-400', t: 'MODERATE', i: <Activity size={48}/>, a: 'Follow up 1 week' }, ORANGE: { c: 'bg-orange-500', t: 'HIGH RISK', i: <AlertTriangle size={48}/>, a: 'PHC in 3 days' }, RED: { c: 'bg-red-600', t: 'DANGER', i: <AlertTriangle size={48}/>, a: 'HOSPITAL NOW' } }[riskLevel];
                return (
                <div key="result" className="p-6 h-full flex flex-col items-center text-center overflow-y-auto animate-in zoom-in duration-500">
                    {showConfetti && riskLevel === 'GREEN' && <div className="absolute inset-0 pointer-events-none flex justify-center pt-20"><Sparkles className="text-yellow-400 w-16 h-16 animate-ping"/></div>}
                    <div className={`${cfg.c} text-white w-48 h-48 rounded-full flex flex-col items-center justify-center shadow-2xl mb-6 ring-8 ring-gray-100 animate-bounce`}>{cfg.i}<div className="font-bold text-2xl mt-2">{t(cfg.t, cfg.t)}</div></div>
                    <div className="text-4xl font-black text-gray-800 mb-6">{riskScore} <span className="text-sm text-gray-500 font-medium">SCORE</span></div>
                    <div className="w-full bg-white p-6 rounded-3xl border border-gray-100 text-left shadow-lg mb-6 hover:scale-105 transition-transform"><h4 className="font-bold text-gray-700 border-b pb-3 mb-2">{t('सलाह', 'Recommendation')}</h4><p className="font-medium text-gray-800 text-lg">{cfg.a}</p></div>
                    
                    {/* NEW: Credential Multiplier (Doctor Audio) */}
                    {(riskLevel === 'RED' || riskLevel === 'ORANGE') && (
                        <div className="w-full mb-4 animate-in slide-in-from-bottom-4">
                            <button 
                                onClick={handlePlayDoctorAudio}
                                className={`w-full py-4 rounded-xl font-bold text-sm shadow-lg flex items-center justify-center gap-3 transition-all ${isPlayingDoctor ? 'bg-green-100 text-green-700 border-2 border-green-500' : 'bg-blue-600 text-white hover:bg-blue-700 active:scale-95'}`}
                            >
                                {isPlayingDoctor ? <Volume2 size={24} className="animate-pulse"/> : <PlayCircle size={24} />}
                                <div className="text-left">
                                    <div className="text-lg leading-none">{isPlayingDoctor ? t('डॉक्टर बोल रहे हैं...', 'Dr. Speaking...') : t('डॉक्टर का संदेश सुनाएं', 'Play Doctor Message')}</div>
                                    <div className="text-[10px] opacity-80 font-normal">{t('परिवार को सुनाएं', 'Make Family Listen')}</div>
                                </div>
                            </button>
                        </div>
                    )}

                    {/* NEW: Digital Certificate */}
                    {(riskLevel === 'RED' || riskLevel === 'ORANGE') && (
                        <div className="w-full bg-yellow-50 border-2 border-yellow-200 p-4 rounded-xl mb-6 text-left relative overflow-hidden">
                            <div className="absolute top-0 right-0 opacity-10"><FileBadge size={80}/></div>
                            <h4 className="font-bold text-yellow-900 text-sm uppercase flex items-center gap-2"><Landmark size={14}/> Official Referral</h4>
                            <p className="text-xs text-yellow-800 mt-1 font-mono">REF-ID: {Date.now().toString().slice(-6)}</p>
                            <p className="text-xs text-yellow-800 mt-2 font-bold">Authorized by MO, PHC Nandgaon</p>
                        </div>
                    )}

                    {(riskLevel === 'RED' || riskLevel === 'ORANGE') && (
                        <div className="w-full mb-6 animate-in slide-in-from-bottom-4">
                            {!referralStatus ? (
                                <button 
                                    onClick={handleReferral}
                                    className="w-full bg-red-600 text-white py-4 rounded-xl font-bold text-sm shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-transform hover:bg-red-700 animate-pulse"
                                >
                                    <Ambulance size={24} />
                                    <div className="text-left">
                                        <div className="text-lg leading-none">{t('रेफरल शुरू करें', 'Initiate Referral')}</div>
                                        <div className="text-[10px] opacity-80 font-normal">Auto-Alert Ambulance & PHC</div>
                                    </div>
                                </button>
                            ) : referralStatus === 'processing' ? (
                                <div className="w-full bg-gray-800 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-3">
                                    <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                    {t('प्रोसेसिंग...', 'Connecting to Network...')}
                                </div>
                            ) : (
                                <div className="bg-green-50 border border-green-200 p-4 rounded-xl text-left">
                                    <div className="flex items-center gap-2 text-green-700 font-bold mb-2">
                                        <Check size={18} /> {t('रेफरल सफल!', 'Referral Confirmed!')}
                                    </div>
                                    <div className="space-y-2 text-xs text-gray-600">
                                        <div className="flex justify-between"><span>Ref ID:</span> <span className="font-mono font-bold">REF-2025-998</span></div>
                                        <div className="flex justify-between"><span>Ambulance:</span> <span className="font-bold">KA-01-EQ-4422 (Dispatched)</span></div>
                                        <div className="flex justify-between"><span>PHC Alerted:</span> <span className="font-bold">Dr. Rao (Nandgaon)</span></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    <div className="w-full grid grid-cols-2 gap-3 mb-6">
                        <button onClick={generateDietPlan} disabled={aiLoading} className="bg-green-50 text-green-700 py-3 rounded-xl font-bold text-sm border border-green-200 hover:bg-green-100 transition-colors">{aiLoading ? "..." : "🍎 Diet Plan (AI)"}</button>
                        <button onClick={generateFamilyScript} disabled={aiLoading} className="bg-indigo-50 text-indigo-700 py-3 rounded-xl font-bold text-sm border border-indigo-200 hover:bg-indigo-100 transition-colors">{aiLoading ? "..." : "👪 Counsel Family"}</button>
                    </div>
                    
                    <button onClick={handleSaveVisit} className="w-full bg-gray-900 text-white py-5 rounded-2xl font-bold shadow-lg active:scale-95 hover:shadow-xl hover:-translate-y-1 transition-all">{t('सेव करें', 'Save & Close')}</button>
                    <div className="mt-8 text-xs text-gray-400">Government Footer Viewable on Scroll</div>
                </div>
                );
            };

            const isAuthScreen = screen === 'login' || screen === 'signup' || screen === 'splash';

            return (
                <div className="max-w-md mx-auto h-screen bg-white flex flex-col font-sans overflow-hidden">
                {!isAuthScreen && (
                    <Header 
                        title={screen === 'home' ? 'MAMATA' : screen === 'inventory' ? 'Inventory' : screen === 'training' ? 'ASHA Academy' : screen === 'finance' ? 'My Earnings' : screen === 'support' ? 'Support' : selectedMother?.name || 'Visit'} 
                        backAction={screen !== 'home' ? () => setScreen('home') : null} 
                        onMenuClick={() => setScreen('asha_profile')} 
                    />
                )}
                <div className="flex-1 overflow-y-auto bg-gray-50">
                    {screen === 'login' && renderLogin()}
                    {screen === 'signup' && renderSignup()}
                    {screen === 'home' && renderHome()}
                    {screen === 'inventory' && renderInventory()}
                    {screen === 'training' && renderTraining()}
                    {screen === 'finance' && renderFinance()}
                    {screen === 'asha_profile' && renderAshaProfile()}
                    {screen === 'profile' && renderDetailedProfile()}
                    {screen === 'registration' && renderRegistration()}
                    {screen === 'asdt' && renderASDT()}
                    {screen === 'symptoms' && renderSymptoms()}
                    {screen === 'result' && renderResult()}
                    {screen === 'support' && renderSupport()}
                </div>

                {screen === 'home' && (
                    <div className="fixed bottom-24 right-6 z-30">
                            <button 
                                onClick={() => setScreen('inventory')}
                                className="bg-indigo-600 text-white p-3 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center justify-center relative"
                            >
                                <Package size={20} />
                                {Object.values(inventory).some(i => i.count <= i.min) && (
                                    <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>
                                )}
                            </button>
                    </div>
                )}

                {!isAuthScreen && (
                    <div className="fixed bottom-6 right-6 z-40 animate-in slide-in-from-bottom-12 fade-in delay-500">
                        <button
                            onClick={() => setShowChat(true)}
                            className="group relative flex items-center justify-center rounded-full bg-white shadow-xl shadow-purple-500/30 transition-all hover:scale-105 active:scale-95"
                        >
                            <div className="relative flex items-center gap-2 bg-gradient-to-tr from-pink-600 to-purple-700 text-white px-5 py-4 rounded-full border-4 border-white">
                                <Sparkles className="h-5 w-5 text-yellow-300 animate-spin-slow" fill="currentColor" />
                                <span className="font-bold text-sm tracking-wide">{t('Ask Didi', 'Ask Didi AI')}</span>
                            </div>
                        </button>
                    </div>
                )}

                <AskDidiModal isOpen={showChat} onClose={() => setShowChat(false)} lang={lang} />
                <NotificationOverlay isOpen={showNotifications} onClose={() => setShowNotifications(false)} notifications={allNotifications} />
                <QrScannerOverlay isOpen={showScanner} onClose={() => setShowScanner(false)} onScan={handleScanSuccess} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MamataAppQr />);
    </script>
</body>
</html>
